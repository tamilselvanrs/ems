spring:
  datasource:
    url: jdbc:h2:mem:ems_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;LOCK_TIMEOUT=10000
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20   # enough threads for concurrency tests
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
  flyway:
    enabled: false

logging:
  level:
    com.ems: DEBUG
    org.hibernate.SQL: WARN
