spring:
  application:
    name: ems-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/ems
    username: ems
    password: ems_dev
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ems: DEBUG
    org.springframework.web: INFO

ems:
  insurer:
    stub-base-url: http://localhost:9090
  submission:
    realtime:
      timeout-ms: 10000
      retry-max: 5
    batch:
      default-cutoff-time: "18:00"
